<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Admin Login | Voltify.lk</title><link rel="stylesheet" href="/assets/style.css"></head>
<body class="login-page">
  <div class="card login-card">
    <a class="logo" href="/"><img src="/assets/logo.png" alt="Voltify.lk logo"><span>Voltify.lk<small>Admin Panel</small></span></a>
    <div class="eyebrow">Secure admin access</div>
    <h1 style="font-size:46px">Login</h1>
    <p>You can also use the main Login page. Admin credentials open the admin dashboard.</p>
    <div class="form-grid">
      <input class="full" id="adminEmail" value="admin@voltify.lk" placeholder="Email">
      <input class="full" id="adminPassword" value="Admin@12345" type="password" placeholder="Password">
      <button class="btn full" id="adminLoginBtn">Login to Dashboard</button>
    </div>
    <p class="message" id="loginMessage"></p>
    <p><a href="/">← Back to website</a></p>
  </div>
  <script src="/assets/admin.js"></script>
</body>
</html>
